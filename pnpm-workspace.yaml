minimumReleaseAgeExclude:
  - '@triggerix/core'
  - '@triggerix/editor'
  - '@triggerix/runtime'
  - triggerix-editor-vue
  - triggerix-editor-preset-war3
  - '@triggerix/registry'
  - '@triggerix-ai/component'
  - '@triggerix-ai/registry'
  - '@triggerix-ai/fn'
  - triggerix-ai
  - triggerix-ai-component-native
  - '@triggerix-ai/builder'
  - '@triggerix-ai/builder'

shellEmulator: true

trustPolicy: no-downgrade

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

catalog:
  '@triggerix-ai/builder': ^0.0.6
  '@triggerix-ai/component': ^0.0.8
  '@triggerix-ai/fn': ^0.0.8
  '@triggerix-ai/registry': ^0.0.8
  '@triggerix/runtime': ^0.0.11
  '@unocss/reset': ^66.7.2
  '@vitejs/plugin-vue': ^6.0.7
  triggerix-ai: ^0.0.8
  triggerix-ai-component-native: ^0.0.2
  triggerix-editor-vue: ^0.0.11
  triggerix-editor-preset-war3: ^0.0.8
  typescript: ^6.0.3
  unocss: ^66.7.2
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.1
  vite-plus: ^0.2.1
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.24
  vue: ^3.5.38
  vue-router: ^5.1.0

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

allowBuilds:
  '@parcel/watcher': true
