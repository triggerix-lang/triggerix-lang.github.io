minimumReleaseAgeExclude:
  - '@triggerix/core'
  - '@triggerix/editor'
  - '@triggerix/runtime'
  - triggerix-editor-vue
  - triggerix-ui-preset-war3

shellEmulator: true

trustPolicy: no-downgrade

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
catalog:
  '@triggerix/runtime': ^0.0.5
  '@unocss/reset': latest
  '@vitejs/plugin-vue': ^5.2.0
  triggerix-editor-vue: ^0.0.5
  triggerix-ui-preset-war3: ^0.0.4
  typescript: ~6.0.2
  unocss: latest
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: ^3.5.0
  vue-router: ^5.1.0
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
